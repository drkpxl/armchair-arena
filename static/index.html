<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armchair Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <header>
    <h1>🛋️ Armchair Arena</h1>
    <nav>
      <a href="/" class="active">Compare</a>
      <a href="/analytics">Analytics</a>
    </nav>
  </header>
  <main>
    <div id="health" class="health" hidden></div>
    <textarea id="question" placeholder="Ask anything — research, summarization, advice, recipes, planting tips…"></textarea>

    <div class="hint" id="modelsHint" style="margin-top:12px">Pick exactly 3 models to compare (web tools are always available, the model decides when to use them):</div>
    <div class="models" id="models"></div>
    <button type="button" class="models-bar secondary" id="modelsBar" hidden></button>

    <div class="toolbar">
      <button id="run" disabled>Run</button>
      <button id="shuffle" type="button" class="secondary">🎲 Shuffle 3</button>
      <button id="reset" class="secondary">Reset</button>
      <span class="hint" id="status"></span>
    </div>

    <div class="cards" id="cards"></div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
